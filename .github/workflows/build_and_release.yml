name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install rumps watchdog py2app setuptools pywebview

      - name: AIDE 앱 빌드
        run: |
          python3 setup_aide.py py2app

      - name: 앱 압축
        run: |
          cd dist_aide
          zip -r "AIDE.zip" "AIDE.app"

      - name: CHANGELOG에서 릴리즈 노트 추출
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## $VERSION/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: GitHub Release 생성 및 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: dist_aide/AIDE.zip
          name: Release ${{ github.ref_name }}
          body: |
            ## AIDE ${{ github.ref_name }}

            ### 변경 사항
            ${{ steps.changelog.outputs.notes }}

            ---
            ### ⚠️ 설치 필수 사항
            > **AIDE.app 은 반드시 응용 프로그램 폴더에 넣어야 자동 업데이트가 됩니다.**

            ### 설치 방법
            1. 아래 `AIDE.zip` 다운로드
            2. 압축 해제
            3. `AIDE.app` 을 **응용 프로그램 폴더로 이동** (필수!)
            4. `AIDE.app` 실행
            5. 보안 경고 뜨면 시스템 설정 → 개인정보 보호 → 그래도 열기
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
